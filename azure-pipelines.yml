
trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: dev
    jobs:
      - job: python_install
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
              addToPath: true
              architecture: 'x64'
          
          - script: |
              python -m pip install --upgrade pip
              python -m pip install pytest
            displayName: Upgrade pip & pytest

          - script: |
               python -m pytest
            displayName: Run tests

      

          