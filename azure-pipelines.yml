
trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: dev
    jobs:
      - job: python-install
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.x'
              addToPath: true
              architecture: 'x64'
          
          - task: PythonScript@0
            inputs:
             scriptSource: 'inline'
             script: 'pip install -r requirements.txt'
          
          - task: PythonScript@0
            inputs:
              scriptSource: 'inline'
              script: 'pytest'
          
          - task: PythonScript@0
            inputs:
              scriptSource: 'inline'
              script: 'pytest'